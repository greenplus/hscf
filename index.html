<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>亜空間五目 オンライン対戦</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <section class="topbar">
        <div>
          <h1>亜空間五目</h1>
          <p id="connectionStatus">未接続</p>
        </div>
        <div class="connection">
          <label>
            名前
            <input id="nameInput" maxlength="24" autocomplete="nickname" placeholder="プレイヤー名">
          </label>
          <label>
            WebSocket URL
            <input id="serverUrlInput" inputmode="url" placeholder="wss://your-server.example.com/ws">
          </label>
          <button id="connectButton">接続</button>
        </div>
      </section>

      <section class="layout">
        <aside class="sidebar">
          <div class="panel">
            <div class="panel-header">
              <h2>部屋</h2>
              <button id="refreshRoomsButton" title="更新">更新</button>
            </div>
            <div id="roomList" class="room-list"></div>
          </div>

          <div class="panel">
            <div class="panel-header">
              <h2>参加者</h2>
              <button id="leaveRoomButton">退室</button>
            </div>
            <div class="room-actions">
              <button id="participationButton">対戦参加</button>
              <button id="startGameButton">対局開始</button>
            </div>
            <div id="playerList" class="player-list"></div>
          </div>

          <div class="panel chat-panel">
            <h2>チャット</h2>
            <div id="chatLog" class="chat-log"></div>
            <form id="chatForm" class="chat-form">
              <input id="chatInput" maxlength="300" placeholder="メッセージ">
              <button>送信</button>
            </form>
          </div>
        </aside>

        <section class="board-area">
          <div class="game-summary">
            <div>
              <strong id="turnLabel">手番: -</strong>
              <span id="myColorLabel">あなた: -</span>
            </div>
            <div id="scoreLabel">黒 0 / 白 2</div>
          </div>
          <div id="messageLine" class="message-line">サーバーに接続してください。</div>
          <div id="board" class="board" aria-label="19路盤"></div>
          <div id="moveLog" class="move-log"></div>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
